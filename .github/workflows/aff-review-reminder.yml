name: AFF Review Process Reminder

on:
  pull_request_target:
    types: [opened, reopened]
    paths:
      - 'file-formats/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  post-review-reminder:
    name: Post review process reminder
    runs-on: ubuntu-latest
    steps:
    - name: Check if comment already exists
      id: find
      run: |
        ID=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" \
          --jq '[.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- aff-review-reminder -->"))][0].id // empty')
        echo "id=${ID:-}" >> "$GITHUB_OUTPUT"
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        PR: ${{ github.event.pull_request.number }}

    - name: Post review reminder
      if: steps.find.outputs.id == ''
      env:
        GH_TOKEN: ${{ github.token }}
        GH_REPO: ${{ github.repository }}
        PR: ${{ github.event.pull_request.number }}
        BODY: |
          <!-- aff-review-reminder -->
          ## AFF Review Process

          Thank you for your contribution to the ABAP File Formats! 🎉

          To help us manage reviews efficiently:
          - Add the **`awaiting-review`** label when ready for (re)review
          - See [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for review process details

          You can use the **Hyperspace PR Bot** for an initial automated review before requesting human review — just comment `/review` on this PR.
      run: gh pr comment "$PR" --body "$BODY"
