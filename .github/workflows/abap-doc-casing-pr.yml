name: ABAP Doc Casing Check (PR)

on:
  pull_request:
    # Only synchronize: the reset checklist step should fire only when new commits are
    # pushed, not on PR open/reopen. In workflow_run context, the original PR action
    # is not directly accessible, so narrowing the trigger source is the cleanest way
    # to ensure reset only happens on actual changes.
    types: [synchronize]
    paths:
      - '**.abap'

permissions: {}

jobs:
  trigger-only:
    name: Trigger workflow_run only
    runs-on: ubuntu-latest
    steps:
    - name: No-op
      run: echo "Trigger workflow_run for secure checklist posting"
